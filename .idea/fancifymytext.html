<!DOCTYPE html>
<html>
<head>
  <title>Fancify Shamcify</title>
  <!-- link to your script file here -->
  <script src="fancifymytext.js" defer></script>
</head>

<body>
<h1>Fancify my Text</h1>

<!-- Comment Text Box -->
<fieldset>
  <legend>Text</legend>
  <label for="comments">Comments:</label>
  <textarea id="comments" name="comments" rows="4" cols="30" placeholder="Testing Styling"></textarea>
</fieldset>

<!-- Styling Controls -->
<fieldset>
  <legend>Fancify</legend>
  <div>
  <button type="button" id="biggerBtn">Bigger!</button>
  <button type="button" id="mooBtn">Moo</button>
  </div>

  <div>
    <label>
      <input type="radio" id="fancy" name="style" onchange="styleText()" checked>
      FancyShmancy
    </label>
  </div>

  <div>
    <label>
      <input type="radio" id="boring" name="style" onchange="styleText()" checked>
      BoringBetty
    </label>
  </div>
</fieldset>

</body>
</html>
